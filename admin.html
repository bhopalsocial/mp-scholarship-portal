<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP Board Scholarship - Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        header { grid-column: 1 / -1; background: linear-gradient(135deg, #1e3c72, #2a5298); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .student-list { background: #1e293b; border-radius: 12px; padding: 15px; height: 75vh; overflow-y: auto; }
        .student-card { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border-left: 4px solid #64748b; position: relative; }
        .student-card:hover { background: #475569; }
        .student-card.active { border-left-color: #38bdf8; background: #475569; }
        .student-card h4 { font-size: 16px; margin-bottom: 4px; padding-right: 80px; }
        .student-card p { font-size: 12px; color: #cbd5e1; }
        .badge { display: inline-block; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 4px; margin-top: 5px; }
        .badge.opened { background: #eab308; color: #000; }
        .badge.submitted { background: #22c55e; color: #fff; }
        .badge.eliminated { background: #ef4444; color: #fff; }
        
        .btn-eliminate { position: absolute; right: 12px; top: 12px; background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        .detail-panel { background: #1e293b; border-radius: 12px; padding: 20px; height: 75vh; overflow-y: auto; display: none; }
        .attempt-box { background: #334155; padding: 15px; border-radius: 8px; margin-top: 15px; }
        .ans-list { margin-top: 10px; font-size: 13px; background: #1e293b; padding: 12px; border-radius: 6px; }
        .q-row { border-bottom: 1px solid #334155; padding: 8px 0; }
        .status-correct { color: #4ade80; font-weight: bold; }
        .status-wrong { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h2>🛡️ Admin Control Room</h2>
    <div>🔴 Live Monitoring Active</div>
</header>

<div class="container" style="margin-top: 20px;">
    <div class="student-list" id="student-list-container"></div>
    <div class="detail-panel" id="detail-panel">
        <h3 style="color: #38bdf8; font-size: 22px;">🎓 Details (<span id="det-name">---</span>)</h3>
        <p style="margin-top: 8px; color: #94a3b8;">ID: <span id="det-id">---</span></p>
        <div id="attempts-container"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
        authDomain: "mytestapp-7b70d.firebaseapp.com",
        databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
        projectId: "mytestapp-7b70d",
        storageBucket: "mytestapp-7b70d.firebasestorage.app",
        messagingSenderId: "380512974619",
        appId: "1:380512974619:web:a7ecfba6999a600a7cc5be",
        measurementId: "G-ZMV07B4JY6"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let allStudentsData = {};

    database.ref('online_tests').on('value', (snapshot) => {
        allStudentsData = snapshot.val() || {};
        const listDiv = document.getElementById('student-list-container');
        listDiv.innerHTML = '';
        
        for (let id in allStudentsData) {
            const student = allStudentsData[id];
            listDiv.innerHTML += `
                <div class="student-card" id="card-${id}" onclick="showStudentDetails('${id}')">
                    <h4>👤 ${student.name || id}</h4>
                    <p>ID: ${id}</p>
                    <span class="badge ${student.portal_status === 'ELIMINATED' ? 'eliminated' : 'submitted'}">${student.portal_status || 'ACTIVE'}</span>
                    <button class="btn-eliminate" onclick="event.stopPropagation(); database.ref('online_tests/${id}').remove()">Eliminate</button>
                </div>
            `;
        }
    });

    function showStudentDetails(id) {
        const student = allStudentsData[id];
        document.getElementById('detail-panel').style.display = 'block';
        document.getElementById('det-name').innerText = student.name || id;
        document.getElementById('det-id').innerText = id;

        let answersHtml = '';
        for (let key in student) {
            if (key.startsWith('answer_q')) {
                const q = student[key];
                answersHtml += `<div class="q-row"><b>${q.question}</b><br>जवाब: <span class="${q.status === 'CORRECT' ? 'status-correct' : 'status-wrong'}">${q.selected_option}</span></div>`;
            }
        }

        document.getElementById('attempts-container').innerHTML = `
            <div class="attempt-box">
                <div class="ans-list">${answersHtml}</div>
                <div id="video-wrapper-${id}" style="margin-top:15px;">वीडियो लोड हो रहा है...</div>
            </div>
        `;

        // वीडियो मर्जिंग कॉल
        if (student.recorded_video_feed) {
            mergeAndPlayVideo(student.recorded_video_feed, id);
        } else {
            document.getElementById(`video-wrapper-${id}`).innerHTML = "कोई वीडियो डेटा नहीं मिला।";
        }
    }

    function mergeAndPlayVideo(feeds, id) {
        const wrapper = document.getElementById(`video-wrapper-${id}`);
        let sortedKeys = Object.keys(feeds).sort((a, b) => {
            return parseInt(a.replace('video_part_', '')) - parseInt(b.replace('video_part_', ''));
        });

        let blobs = sortedKeys.map(k => {
            let b64 = feeds[k].split(',')[1];
            let byteChars = atob(b64);
            let bytes = new Uint8Array(byteChars.length);
            for(let i=0; i<byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
            return new Blob([bytes], {type: 'video/webm'});
        });
        
        const videoUrl = URL.createObjectURL(new Blob(blobs, {type: 'video/webm'}));
        wrapper.innerHTML = `<video controls src="${videoUrl}"></video>`;
    }
</script>
</body>
</html>
