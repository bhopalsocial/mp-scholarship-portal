<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Control Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; padding: 20px; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
        .card { background: #334155; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; }
        .video-box { background: #1e293b; padding: 20px; border-radius: 8px; }
        video { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="grid">
        <div id="student-list">Loading...</div>
        <div id="view-area" class="video-box">Student chunein...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
            authDomain: "mytestapp-7b70d.firebaseapp.com",
            databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
            projectId: "mytestapp-7b70d",
            storageBucket: "mytestapp-7b70d.firebasestorage.app",
            messagingSenderId: "380512974619",
            appId: "1:380512974619:web:a7ecfba6999a600a7cc5be"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        db.ref('online_tests').on('value', (snap) => {
            const data = snap.val() || {};
            const list = document.getElementById('student-list');
            list.innerHTML = '<h3>Students:</h3>';
            for (let id in data) {
                list.innerHTML += `<div class="card" onclick="playVideo('${id}')">👤 ${data[id].name || id}</div>`;
            }
            window.allStudents = data;
        });

        function playVideo(id) {
            const student = window.allStudents[id];
            const area = document.getElementById('view-area');
            if (student.recorded_video_feed) {
                let feeds = student.recorded_video_feed;
                let sortedKeys = Object.keys(feeds).sort((a, b) => {
                    return parseInt(a.replace('video_part_', '')) - parseInt(b.replace('video_part_', ''));
                });

                let blobs = sortedKeys.map(k => {
                    let b = atob(feeds[k].split(',')[1]);
                    let arr = new Uint8Array(b.length);
                    for(let i=0; i<b.length; i++) arr[i] = b.charCodeAt(i);
                    return new Blob([arr], {type: 'video/webm'});
                });
                
                let url = URL.createObjectURL(new Blob(blobs, {type: 'video/webm'}));
                area.innerHTML = `<h3>${student.name || id}</h3><video controls src="${url}"></video>`;
            } else {
                area.innerHTML = 'Video data nahi mila.';
            }
        }
    </script>
</body>
</html>
