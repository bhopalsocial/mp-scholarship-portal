<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP Board Scholarship - Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        header { grid-column: 1 / -1; background: linear-gradient(135deg, #1e3c72, #2a5298); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .student-list { background: #1e293b; border-radius: 12px; padding: 15px; height: 75vh; overflow-y: auto; }
        .student-card { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border-left: 4px solid #64748b; position: relative; }
        .student-card:hover { background: #475569; }
        .student-card.active { border-left-color: #38bdf8; background: #475569; }
        .student-card h4 { font-size: 16px; margin-bottom: 4px; padding-right: 80px; }
        .student-card p { font-size: 12px; color: #cbd5e1; }
        .badge { display: inline-block; padding: 2px 6px; font-size: 10px; font-weight: bold; border-radius: 4px; margin-top: 5px; }
        .badge.opened { background: #eab308; color: #000; }
        .badge.submitted { background: #22c55e; color: #fff; }
        .badge.eliminated { background: #ef4444; color: #fff; }
        
        .btn-eliminate { position: absolute; right: 12px; top: 12px; background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-eliminate:hover { background: #b91c1c; }
        
        .detail-panel { background: #1e293b; border-radius: 12px; padding: 20px; height: 75vh; overflow-y: auto; display: none; }
        .attempt-box { background: #334155; padding: 15px; border-radius: 8px; margin-top: 15px; }
        video { width: 100%; max-width: 320px; border-radius: 8px; background: #000; margin-top: 10px; display: block; }
        
        /* आंसर शीट बॉक्स स्टाइल */
        .ans-list { margin-top: 10px; font-size: 13px; background: #1e293b; padding: 12px; border-radius: 6px; }
        .q-row { border-bottom: 1px solid #334155; padding: 8px 0; }
        .q-row:last-child { border-bottom: none; }
        .status-correct { color: #4ade80; font-weight: bold; margin-left: 5px; }
        .status-wrong { color: #f87171; font-weight: bold; margin-left: 5px; }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
            authDomain: "mytestapp-7b70d.firebaseapp.com",
            databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
            projectId: "mytestapp-7b70d",
            storageBucket: "mytestapp-7b70d.firebasestorage.app",
            messagingSenderId: "380512974619",
            appId: "1:380512974619:web:a7ecfba6999a600a7cc5be",
            measurementId: "G-ZMV07B4JY6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        window.addEventListener("load", () => {
            database.ref('students').on('value', (snapshot) => {
                const data = snapshot.val();
                renderStudentList(data);
            });
        });

        let allStudentsData = {};

        function renderStudentList(students) {
            allStudentsData = students || {};
            const listDiv = document.getElementById('student-list-container');
            listDiv.innerHTML = students ? '' : '<p style="color:#94a3b8;">Abhi koi student connect nahi hai...</p>';
            
            for (let id in students) {
                const profile = students[id].profile || {};
                const name = profile.name || id;
                const status = profile.portal_status || "UNKNOWN";
                const time = profile.last_active_at ? new Date(profile.last_active_at).toLocaleTimeString() : 'N/A';
                
                let badgeClass = 'badge opened';
                if(status.toLowerCase().includes('submitted')) badgeClass = 'badge submitted';
                if(status === 'ELIMINATED') badgeClass = 'badge eliminated';
                
                listDiv.innerHTML += `
                    <div class="student-card" id="card-${id}" onclick="showStudentDetails('${id}')">
                        <h4>👤 ${name}</h4>
                        <p>ID: ${id}</p>
                        <p>Last Active: ${time}</p>
                        <span class="${badgeClass}">${status}</span>
                        <button class="btn-eliminate" onclick="eliminateStudent(event, '${id}')">Eliminate</button>
                    </div>
                `;
            }
        }

        function eliminateStudent(event, id) {
            event.stopPropagation(); 
            if (confirm(`क्या आप वाकई इस छात्र को बाहर करके इसका सारा डेटा डिलीट करना चाहते हैं?`)) {
                database.ref('students/' + id + '/profile').update({
                    portal_status: "ELIMINATED"
                }).then(() => {
                    document.getElementById('detail-panel').style.display = 'none';
                    setTimeout(() => {
                        database.ref('students/' + id).remove() 
                        .then(() => {
                            alert(`छात्र का डेटा डिलीट कर दिया गया है!`);
                        });
                    }, 2000);
                });
            }
        }

        function showStudentDetails(id) {
            if (!allStudentsData[id]) return;

            document.querySelectorAll('.student-card').forEach(c => c.classList.remove('active'));
            const selectedCard = document.getElementById('card-' + id);
            if(selectedCard) selectedCard.classList.add('active');

            const detailPanel = document.getElementById('detail-panel');
            detailPanel.style.display = 'block';

            const student = allStudentsData[id];
            const profile = student.profile || {};
            
            document.getElementById('det-name').innerText = profile.name || id;
            document.getElementById('det-id').innerText = id;

            const attemptsDiv = document.getElementById('attempts-container');
            attemptsDiv.innerHTML = '';

            const attempts = student.test_attempts;
            if (!attempts) {
                attemptsDiv.innerHTML = '<p style="color:#94a3b8; margin-top:10px;">Is student ne test start nahi kiya.</p>';
                return;
            }

            for (let attId in attempts) {
                const attempt = attempts[attId];
                const time = attempt.submitted_at ? new Date(attempt.submitted_at).toLocaleString() : 'Live Chal Raha Hai...';
                
                let answersHtml = '';
                if (attempt.answers) {
                    for (let qKey in attempt.answers) {
                        const qItem = attempt.answers[qKey];
                        
                        // पुराने स्ट्रक्चर और नए स्ट्रक्चर दोनों को सपोर्ट करने के लिए बैकअप चेक
                        if (typeof qItem === 'object') {
                            const isCorrect = qItem.status === "CORRECT";
                            answersHtml += `
                                <div class="q-row">
                                    <b>${qKey}: ${qItem.question}</b><br>
                                    <span>छात्र का जवाब: <span style="color: ${isCorrect ? '#4ade80':'#f87171'}">${qItem.selected_option}</span></span> | 
                                    <span>सही जवाब: <span style="color:#4ade80">${qItem.correct_option}</span></span>
                                    <span class="${isCorrect ? 'status-correct' : 'status-wrong'}">[${qItem.status}]</span>
                                </div>
                            `;
                        } else {
                            answersHtml += `<div class="q-row"><b>${qKey}:</b> ${qItem}</div>`;
                        }
                    }
                }

                attemptsDiv.innerHTML += `
                    <div class="attempt-box">
                        <h5>📝 Attempt ID: ${attId}</h5>
                        <p style="font-size:12px; color:#cbd5e1; margin-bottom:8px;">Time: ${time}</p>
                        <div class="ans-list">
                            <strong style="color: #38bdf8; display:block; margin-bottom:5px;">📊 Detailed Answer Sheet:</strong>
                            ${answersHtml || 'No answer yet'}
                        </div>
                        <div style="margin-top:15px;">
                            <strong>🎥 Live Video Feeds (All Clips Merged):</strong>
                            <div id="video-wrapper-${attId}">
                                <p style="font-size:12px; color:#e2e8f0;">Video clips loading...</p>
                            </div>
                        </div>
                    </div>
                `;

                setTimeout(() => {
                    mergeAndPlayVideo(attempt.live_video_feeds, attId);
                }, 200);
            }
        }

        function mergeAndPlayVideo(videoFeeds, attId) {
            const wrapper = document.getElementById(`video-wrapper-${attId}`);
            if (!videoFeeds || Object.keys(videoFeeds).length === 0) {
                wrapper.innerHTML = '<p style="color:#eab308; font-size:13px;">⏳ पहला क्लिप (10 सेकंड) लोड हो रहा है या छात्र ने बंद कर दिया।</p>';
                return;
            }

            try {
                let sortedKeys = Object.keys(videoFeeds).sort((a, b) => {
                    return parseInt(a.replace('video_part_', '')) - parseInt(b.replace('video_part_', ''));
                });

                let blobs = [];
                sortedKeys.forEach(key => {
                    let base64Data = videoFeeds[key];
                    if (base64Data) {
                        let blob = base64ToBlob(base64Data, 'video/webm');
                        blobs.push(blob);
                    }
                });

                let superBlob = new Blob(blobs, { type: 'video/webm' });
                let videoUrl = URL.createObjectURL(superBlob);

                wrapper.innerHTML = `
                    <video controls playsinline style="width:100%; max-width:320px; border: 2px solid #38bdf8;">
                        <source src="${videoUrl}" type="video/webm">
                    </video>
                `;
            } catch (err) {
                wrapper.innerHTML = '<p style="color:#ef4444; font-size:12px;">⚠️ वीडियो प्ले करने में समस्या आई।</p>';
            }
        }

        function base64ToBlob(base64, mimeType) {
            let byteString = atob(base64.split(',')[1]);
            let ab = new ArrayBuffer(byteString.length);
            let ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return new Blob([ab], { type: mimeType });
        }
    </script>
</head>
<body>

<header>
    <h2>🛡️ Admin Control Room (Safe Stream & Exact Delete)</h2>
    <div style="font-size: 14px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 6px;">
        🔴 Live Monitoring Active
    </div>
</header>

<div class="container" style="margin-top: 20px;">
    <div>
        <h3 style="margin-bottom: 10px; font-size: 18px; color: #38bdf8;">👥 Students</h3>
        <div class="student-list" id="student-list-container">
            <p style="color:#94a3b8;">Data sync ho raha hai...</p>
        </div>
    </div>

    <div class="detail-panel" id="detail-panel">
        <h3 style="color: #38bdf8; font-size: 22px; border-bottom: 2px solid #334155; padding-bottom: 10px;">
            🎓 Details (<span id="det-name">---</span>)
        </h3>
        <p style="margin-top: 8px; font-size: 14px; color: #94a3b8;">ID: <span id="det-id" style="color:#fff;">---</span></p>
        
        <div id="attempts-container"></div>
    </div>
</div>

</body>
</html>
