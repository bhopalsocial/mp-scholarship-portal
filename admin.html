<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Control Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0f172a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        header { background: linear-gradient(135deg, #1e3c72, #2a5298); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .card-list { background: #1e293b; padding: 15px; border-radius: 8px; min-height: 75vh; }
        .card { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border-left: 4px solid #64748b; position: relative; }
        .card:hover { background: #475569; }
        .card.active { border-left-color: #38bdf8; background: #475569; }
        .card h4 { font-size: 16px; padding-right: 80px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .card p { font-size: 11px; color: #cbd5e1; margin-top: 3px; }
        .btn-eliminate { position: absolute; right: 12px; top: 12px; background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 10; }
        .btn-eliminate:hover { background: #b91c1c; }
        .video-box { background: #1e293b; padding: 20px; border-radius: 8px; min-height: 75vh; overflow-y: auto; }
        video { width: 100%; max-width: 480px; border-radius: 8px; margin-top: 15px; display: block; border: 2px solid #38bdf8; }
        .q-row { background: #334155; padding: 12px; margin-top: 8px; border-radius: 6px; font-size: 14px; border-bottom: 1px solid #475569; }
        .status-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-top: 5px; }
        .status-SUBMITTED { background: #16a34a; color: white; }
        .status-OPENED { background: #eab308; color: black; }
    </style>
</head>
<body>

    <header>
        <h2>🛡️ Admin Control Room (Safe Stream & Exact Delete)</h2>
    </header>

    <div class="grid">
        <div class="card-list" id="student-list">
            <h3>Students:</h3>
            <p style="color:#94a3b8; font-size:14px; margin-top:10px;">Loading data...</p>
        </div>
        <div id="view-area" class="video-box">
            <h3>Student chunein...</h3>
            <p style="color:#94a3b8; margin-top:10px;">Kisi bhi student par click karke details aur video dekhein.</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
            authDomain: "mytestapp-7b70d.firebaseapp.com",
            databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
            projectId: "mytestapp-7b70d",
            storageBucket: "mytestapp-7b70d.firebasestorage.app",
            messagingSenderId: "380512974619",
            appId: "1:380512974619:web:a7ecfba6999a600a7cc5be",
            measurementId: "G-ZMV07B4JY6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        window.allStudents = {};
        
        // नए नोड 'students' से डेटा रीड करना
        db.ref('students').on('value', (snap) => {
            const data = snap.val() || {};
            window.allStudents = data;
            
            const list = document.getElementById('student-list');
            list.innerHTML = '<h3>Students:</h3>';
            
            let hasStudents = false;
            for (let id in data) {
                hasStudents = true;
                const profile = data[id].profile || {};
                const studentName = profile.name || "Unknown";
                const status = profile.portal_status || "OPENED";
                
                list.innerHTML += `
                    <div class="card" id="card-${id}" onclick="playVideo('${id}')">
                        <h4>👤 ${studentName}</h4>
                        <p>ID: ${id}</p>
                        <span class="status-badge status-${status}">${status}</span>
                        <button class="btn-eliminate" onclick="eliminateStudent(event, '${id}')">Eliminate</button>
                    </div>
                `;
            }
            if(!hasStudents) {
                list.innerHTML += '<p style="color:#94a3b8; font-size:14px; margin-top:10px;">Koi student connect nahi hai.</p>';
            }
        });

        // एलिमिनेट (डेटा डिलीट) करने का फंक्शन
        function eliminateStudent(event, id) {
            event.stopPropagation();
            if (confirm(`Kya aap waqai is student ko eliminate karke Firebase se sara data delete karna chahte hain?`)) {
                db.ref('students/' + id).remove()
                .then(() => {
                    alert(`Student ka data successfully delete kar diya gaya hai!`);
                    document.getElementById('view-area').innerHTML = `
                        <h3>Student chunein...</h3>
                        <p style="color:#94a3b8; margin-top:10px;">Kisi bhi student par click karke details aur video dekhein.</p>
                    `;
                }).catch(e => alert("Delete karne me dikkat aayi: " + e));
            }
        }

        // छात्र की पूरी जानकारी और सीधा वीडियो प्ले करने का फंक्शन
        function playVideo(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            const selectedCard = document.getElementById('card-' + id);
            if(selectedCard) selectedCard.classList.add('active');

            const studentNode = window.allStudents[id];
            const area = document.getElementById('view-area');
            if (!studentNode) return;

            const profile = studentNode.profile || {};
            const attempts = studentNode.test_attempts || {};
            
            let answersHtml = '';
            let videoHtml = '';
            let attemptFound = false;

            // छात्र के सबसे हालिया एटेम्पट से डेटा निकालना
            for (let attemptId in attempts) {
                attemptFound = true;
                const attemptData = attempts[attemptId];
                
                // आंसर रेंडर करना
                if (attemptData.answers) {
                    for (let qKey in attemptData.answers) {
                        answersHtml += `
                            <div class="q-row">
                                <b>❓ ${qKey.replace('answer_', '').toUpperCase()}</b><br>
                                <span style="margin-top:5px; display:inline-block;">Selected Option: <span style="color:#38bdf8; font-weight:bold;">${attemptData.answers[qKey]}</span></span>
                            </div>
                        `;
                    }
                }

                // सीधे सिंगल Base64 स्ट्रिंग से वीडियो लोड करना (बिना किसी बाइनरी एरर के)
                if (attemptData.recorded_video_feed) {
                    videoHtml = `<video controls autoplay src="${attemptData.recorded_video_feed}"></video>`;
                } else {
                    videoHtml = '<p style="color:#eab308; margin-top:10px;">⏳ Student ne test complete nahi kiya ya video upload ho raha hai...</p>';
                }
                break; // नवीनतम प्रयास देखने के बाद लूप रोकना
            }

            if (!attemptFound) {
                videoHtml = '<p style="color:#eab308; margin-top:10px;">⏳ Student ne abhi tak answer submit nahi kiye hain (Test Dynamic Live)...</p>';
            }

            area.innerHTML = `
                <h3 style="color:#38bdf8; border-bottom:2px solid #334155; padding-bottom:8px;">🎓 Details: ${profile.name || 'Unknown'}</h3>
                <div style="margin-top:10px; font-size:13px; color:#cbd5e1;">
                    <p><b>Portal Status:</b> ${profile.portal_status || 'N/A'}</p>
                    <p><b>Last Active:</b> ${profile.last_active_at ? new Date(profile.last_active_at).toLocaleString() : 'N/A'}</p>
                </div>
                <div style="margin-top:20px;">
                    <strong>🎥 Live / Recorded Video Feed:</strong>
                    ${videoHtml}
                </div>
                <div style="margin-top:20px;">
                    <strong>📊 Answer Sheet:</strong>
                    ${answersHtml || '<p style="color:#94a3b8; font-size:14px; margin-top:5px;">Abhi tak koi jawab nahi mila.</p>'}
                </div>
            `;
        }
    </script>
</body>
</html>
