<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Portal - Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #334155; margin-bottom: 30px; }
        h1 { color: #38bdf8; font-size: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-between; }
        .student-name { font-size: 18px; font-weight: bold; color: #f1f5f9; margin-bottom: 10px; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .label { color: #94a3b8; }
        .value { color: #cbd5e1; font-weight: 500; }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-opened { background: #eab308; color: #000; }
        .status-submitted { background: #22c55e; color: #fff; }
        .answers-box { background: #0f172a; padding: 10px; border-radius: 6px; margin: 10px 0; font-size: 12px; line-height: 1.5; }
        .video-box { margin-top: 10px; display: none; }
        video { width: 100%; border-radius: 8px; background: #000; margin-top: 5px; }
        .btn-play { width: 100%; padding: 10px; background: #0284c7; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-delete { width: 100%; padding: 8px; background: #ef4444; color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-delete:hover { background: #dc2626; }
        .no-video { text-align: center; color: #64748b; font-size: 12px; margin-top: 10px; font-style: italic; }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
            authDomain: "mytestapp-7b70d.firebaseapp.com",
            databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
            projectId: "mytestapp-7b70d",
            storageBucket: "mytestapp-7b70d.firebasestorage.app",
            messagingSenderId: "380512974619",
            appId: "1:380512974619:web:a7ecfba6999a600a7cc5be",
            measurementId: "G-ZMV07B4JY6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        window.addEventListener("load", fetchStudentsData);

        function fetchStudentsData() {
            const studentsGrid = document.getElementById('students-grid');
            
            database.ref('online_tests').on('value', (snapshot) => {
                studentsGrid.innerHTML = ''; 
                const data = snapshot.val();
                if (!data) {
                    studentsGrid.innerHTML = '<p style="text-align:center; width:100%;">कोई परीक्षार्थी रिकॉर्ड नहीं मिला।</p>';
                    return;
                }

                Object.keys(data).reverse().forEach((id) => {
                    const student = data[id];
                    const name = student.student_name || "अनाम छात्र";
                    const status = student.portal_status || "OPENED";
                    const videoData = student.recorded_video_feed;

                    let statusClass = status === "SUBMITTED" ? "status-submitted" : "status-opened";

                    let cardHTML = `
                        <div class="card" id="card-${id}">
                            <div>
                                <div class="student-name">${name}</div>
                                <div class="info-row"><span class="label">टोकन ID:</span><span class="value" style="font-size:11px;">${id}</span></div>
                                <div class="info-row"><span class="label">स्टेटस:</span><span class="status-badge ${statusClass}">${status}</span></div>
                                
                                <div class="answers-box">
                                    <strong>📝 छात्र के उत्तर (8 सवाल):</strong><br>
                                    Q1: ${student.answer_q1 || '-'} | Q2: ${student.answer_q2 || '-'} | 
                                    Q3: ${student.answer_q3 || '-'} | Q4: ${student.answer_q4 || '-'}<br>
                                    Q5: ${student.answer_q5 || '-'} | Q6: ${student.answer_q6 || '-'} | 
                                    Q7: ${student.answer_q7 || '-'} | Q8: ${student.answer_q8 || '-'}
                                </div>
                            </div>
                    `;

                    if (videoData) {
                        cardHTML += `
                            <button class="btn-play" onclick="toggleVideo('${id}')">🎬 वीडियो देखें</button>
                            <div id="video-container-${id}" class="video-box">
                                <video id="video-${id}" controls src="${videoData}"></video>
                            </div>
                        `;
                    } else {
                        cardHTML += `<div class="no-video">वीडियो रिकॉर्ड हो रहा है...</div>`;
                    }

                    cardHTML += `
                            <button class="btn-delete" onclick="eliminateStudent('${id}')">❌ Eliminate Student</button>
                        </div>
                    `;
                    studentsGrid.innerHTML += cardHTML;
                });
            });
        }

        function toggleVideo(id) {
            const container = document.getElementById(`video-container-${id}`);
            const video = document.getElementById(`video-${id}`);
            if (container.style.display === "block") {
                container.style.display = "none";
                video.pause();
            } else {
                container.style.display = "block";
                video.play();
            }
        }

        function eliminateStudent(id) {
            if (confirm("क्या आप वाकई इस छात्र को हटाना चाहते हैं?")) {
                database.ref('online_tests/' + id).remove()
                .then(() => { alert("छात्र को एलिमिनेट कर दिया गया है।"); });
            }
        }
    </script>
</head>
<body>
<div class="container">
    <header>
        <h1>🎓 स्कॉलरशिप परीक्षा - एडमिन डैशबोर्ड Pro</h1>
        <div style="font-size: 14px; color: #a7f3d0;">🟢 लाइव कंट्रोल पैनल चालू है</div>
    </header>
    <div id="students-grid" class="grid">डेटा लोड हो रहा है...</div>
</div>
</body>
</html>
