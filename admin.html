<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Admin Control Room</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #0f172a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        header { background: linear-gradient(135deg, #1e3c72, #2a5298); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .card-list { background: #1e293b; padding: 15px; border-radius: 8px; min-height: 75vh; }
        .card { background: #334155; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border-left: 4px solid #64748b; position: relative; }
        .card:hover { background: #475569; }
        .card.active { border-left-color: #38bdf8; background: #475569; }
        .card h4 { font-size: 16px; padding-right: 80px; }
        .card p { font-size: 11px; color: #cbd5e1; margin-top: 3px; }
        .btn-eliminate { position: absolute; right: 12px; top: 12px; background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 10; }
        .btn-eliminate:hover { background: #b91c1c; }
        .video-box { background: #1e293b; padding: 20px; border-radius: 8px; min-height: 75vh; overflow-y: auto; }
        video { width: 100%; max-width: 480px; border-radius: 8px; margin-top: 15px; display: block; border: 2px solid #38bdf8; }
        .q-row { background: #334155; padding: 12px; margin-top: 8px; border-radius: 6px; font-size: 14px; border-bottom: 1px solid #475569; }
    </style>
</head>
<body>

    <header>
        <h2>🛡️ Admin Control Room (Safe Stream)</h2>
    </header>

    <div class="grid">
        <div class="card-list" id="student-list">
            <h3>Students:</h3>
            <p style="color:#94a3b8; font-size:14px; margin-top:10px;">Loading data...</p>
        </div>
        <div id="view-area" class="video-box">
            <h3>Student chunein...</h3>
            <p style="color:#94a3b8; margin-top:10px;">Kisi bhi student par click karke details aur video dekhein.</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
            authDomain: "mytestapp-7b70d.firebaseapp.com",
            databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
            projectId: "mytestapp-7b70d",
            storageBucket: "mytestapp-7b70d.firebasestorage.app",
            messagingSenderId: "380512974619",
            appId: "1:380512974619:web:a7ecfba6999a600a7cc5be"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        window.allStudents = {};
        
        db.ref('online_tests').on('value', (snap) => {
            const data = snap.val() || {};
            window.allStudents = data;
            
            const list = document.getElementById('student-list');
            list.innerHTML = '<h3>Students:</h3>';
            
            let hasStudents = false;
            for (let id in data) {
                hasStudents = true;
                const studentName = data[id].name || id;
                list.innerHTML += `
                    <div class="card" id="card-${id}" onclick="playVideo('${id}')">
                        <h4>👤 ${studentName}</h4>
                        <p>ID: ${id}</p>
                        <button class="btn-eliminate" onclick="eliminateStudent(event, '${id}')">Eliminate</button>
                    </div>
                `;
            }
            if(!hasStudents) {
                list.innerHTML += '<p style="color:#94a3b8; font-size:14px; margin-top:10px;">Koi student connect nahi hai.</p>';
            }
        });

        function eliminateStudent(event, id) {
            event.stopPropagation();
            if (confirm(`Kya aap waqai is student ko eliminate karke Firebase se data delete karna chahte hain?`)) {
                db.ref('online_tests/' + id).remove()
                .then(() => {
                    alert(`Student ka data successfully delete kar diya gaya hai!`);
                    document.getElementById('view-area').innerHTML = `
                        <h3>Student chunein...</h3>
                        <p style="color:#94a3b8; margin-top:10px;">Kisi bhi student par click karke details aur video dekhein.</p>
                    `;
                }).catch(e => alert("Delete karne me dikkat aayi: " + e));
            }
        }

        function playVideo(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            const selectedCard = document.getElementById('card-' + id);
            if(selectedCard) selectedCard.classList.add('active');

            const student = window.allStudents[id];
            const area = document.getElementById('view-area');
            if (!student) return;

            let answersHtml = '';
            for (let key in student) {
                if (key.startsWith('answer_q')) {
                    const qItem = student[key];
                    if (qItem && typeof qItem === 'object') {
                        answersHtml += `
                            <div class="q-row">
                                <b>❓ ${qItem.question || 'Question'}</b><br>
                                <span style="margin-top:5px; display:inline-block;">Jawab: <span style="color:#38bdf8;">${qItem.selected_option || qItem.ans || 'N/A'}</span></span>
                            </div>
                        `;
                    }
                }
            }

            let videoHtml = '';
            if (student.recorded_video_feed && Object.keys(student.recorded_video_feed).length > 0) {
                let feeds = student.recorded_video_feed;
                
                let sortedKeys = Object.keys(feeds).sort((a, b) => {
                    return parseInt(a.replace('video_part_', '')) - parseInt(b.replace('video_part_', ''));
                });

                try {
                    let blobs = sortedKeys.map(k => {
                        let b64 = feeds[k].split(',')[1];
                        let bin = atob(b64);
                        let arr = new Uint8Array(bin.length);
                        for(let i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
                        return new Blob([arr], {type: 'video/webm'});
                    });
                    
                    const url = URL.createObjectURL(new Blob(blobs, {type: 'video/webm'}));
                    videoHtml = `<video controls autoplay src="${url}"></video>`;
                } catch(err) {
                    videoHtml = '<p style="color:#f87171; margin-top:10px;">⚠️ Video stream load hone me error aaya.</p>';
                }
            } else {
                videoHtml = '<p style="color:#eab308; margin-top:10px;">⏳ Video data abhi tak upload nahi hua hai.</p>';
            }

            area.innerHTML = `
                <h3 style="color:#38bdf8; border-bottom:2px solid #334155; padding-bottom:8px;">🎓 Details: ${student.name || id}</h3>
                <div style="margin-top:15px;">
                    <strong>🎥 Live Video Feed:</strong>
                    ${videoHtml}
                </div>
                <div style="margin-top:20px;">
                    <strong>📊 Answer Sheet:</strong>
                    ${answersHtml || '<p style="color:#94a3b8; font-size:14px; margin-top:5px;">Koi answer submit nahi kiya.</p>'}
                </div>
            `;
        }
    </script>
</body>
</html>
